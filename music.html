<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Galeria</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="icon.png" class="logo-icon" alt="Logo">
                    <span>G<span>ALERIA</span></span>
                </div>
                <button class="close-btn" id="closeSidebar" aria-label="Fechar menu">&times;</button>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link">VOCÊ</a>
                <a href="#" class="nav-link active">MÚSICA</a>
                <a href="sudoku.html" class="nav-link">SUDOKU</a>
            </nav>
        </aside>

        <div class="overlay" id="overlay"></div>

        <div class="content">
            <header class="topbar">
                <button class="menu-btn" id="openSidebar" aria-label="Abrir menu">☰</button>
                <h1 class="topbar-title">Uma música</h1>
            </header>

            <main class="main">
                <section class="spotify-shell" aria-label="Player do Spotify">
                    <div class="spotify-frame">
                        <iframe
                            data-testid="embed-iframe"
                            src="https://open.spotify.com/embed/track/0gyqOGGJzm5zYnAh7bACpI?utm_source=generator"
                            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                            loading="lazy"
                            allowfullscreen
                            title="Spotify Embed">
                        </iframe>
                    </div>
                </section>
            </main>

            <footer class="footer">
                <p class="footer-text"> </p>
            </footer>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const openBtn = document.getElementById('openSidebar');
        const closeBtn = document.getElementById('closeSidebar');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('show');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        }

        openBtn.addEventListener('click', openSidebar);
        closeBtn.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);
    </script>
</body>
</html>
