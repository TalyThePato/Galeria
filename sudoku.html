<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Galeria</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <div class="app">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="icon.png" class="logo-icon" alt="Logo">
                    <span>G<span>ALERIA</span></span>
                </div>
                <button class="close-btn" id="closeSidebar" aria-label="Fechar menu">&times;</button>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link">VOCÊ</a>
                <a href="music.html" class="nav-link">MÚSICA</a>
                <a href="#" class="nav-link active">SUDOKU</a>
            </nav>
        </aside>

        <div class="overlay" id="overlay"></div>

        <div class="content">
            <header class="topbar">
                <button class="menu-btn" id="openSidebar" aria-label="Abrir menu">☰</button>
                <h1 class="topbar-title">Um sudoku</h1>
            </header>

            <main class="main">
                <section class="embed-shell game-shell">
                    <iframe
                        class="media-embed sudoku-embed"
                        src="https://www.sudokubase.com/embed/game?showTimer=true&showInputButtons=true"
                        loading="lazy"
                        title="Sudoku">
                    </iframe>
                    <p class="embed-credit">
                        Never run out of <a href="https://www.sudokubase.com" target="_blank" rel="noopener noreferrer">Sudoku</a> to play.
                    </p>
                </section>
            </main>

            <footer class="footer">
                <span>Pra passar o tempo do jeito certo.</span>
            </footer>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const openBtn = document.getElementById('openSidebar');
        const closeBtn = document.getElementById('closeSidebar');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('show');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        }

        openBtn.addEventListener('click', openSidebar);
        closeBtn.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);
    </script>
</body>
</html>
